apiVersion: v1
kind: Secret
metadata:
  name: overleaf-secrets
  labels:
    app.kubernetes.io/name: overleaf
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
{{- /*
  STAGING_PASSWORD and V1_HISTORY_PASSWORD must be the SAME value:
  project-history sends V1_HISTORY_PASSWORD to history-v1, which authenticates
  against STAGING_PASSWORD. Generate once, use for both keys.
  Use lookup to preserve existing secret values across helm upgrades.
*/}}
{{- $secret := lookup "v1" "Secret" .Release.Namespace "overleaf-secrets" }}
{{- $invite := randAlphaNum 32 }}
{{- $webapi := randAlphaNum 32 }}
{{- $staging := randAlphaNum 32 }}
{{- $crypto := randAlphaNum 32 }}
{{- $otjwt := randAlphaNum 32 }}
{{- $github := randAlphaNum 32 }}
{{- if and $secret $secret.data }}
{{- with $secret.data }}
{{- if .OVERLEAF_INVITE_TOKEN_SECRET }}{{ $invite = .OVERLEAF_INVITE_TOKEN_SECRET | b64dec }}{{ end }}
{{- if .WEB_API_PASSWORD }}{{ $webapi = .WEB_API_PASSWORD | b64dec }}{{ end }}
{{- if .STAGING_PASSWORD }}{{ $staging = .STAGING_PASSWORD | b64dec }}{{ end }}
{{- if .CRYPTO_RANDOM }}{{ $crypto = .CRYPTO_RANDOM | b64dec }}{{ end }}
{{- if .OT_JWT_AUTH_KEY }}{{ $otjwt = .OT_JWT_AUTH_KEY | b64dec }}{{ end }}
{{- if .GITHUB_TOKEN_CIPHER_PASSWORD }}{{ $github = .GITHUB_TOKEN_CIPHER_PASSWORD | b64dec }}{{ end }}
{{- end }}
{{- end }}
stringData:
  OVERLEAF_INVITE_TOKEN_SECRET: {{ $invite | quote }}
  WEB_API_PASSWORD: {{ $webapi | quote }}
  STAGING_PASSWORD: {{ $staging | quote }}
  V1_HISTORY_PASSWORD: {{ $staging | quote }}
  CRYPTO_RANDOM: {{ $crypto | quote }}
  OT_JWT_AUTH_KEY: {{ $otjwt | quote }}
  GITHUB_TOKEN_CIPHER_PASSWORD: {{ $github | quote }}
