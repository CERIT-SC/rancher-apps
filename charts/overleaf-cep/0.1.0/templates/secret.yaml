apiVersion: v1
kind: Secret
metadata:
  name: overleaf-secrets
  labels:
    app.kubernetes.io/name: overleaf
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
{{- /*
  STAGING_PASSWORD and V1_HISTORY_PASSWORD must be the SAME value:
  project-history sends V1_HISTORY_PASSWORD to history-v1, which authenticates
  against STAGING_PASSWORD. Generate once, use for both keys.
  Use lookup to preserve existing secret values across helm upgrades.
*/}}
{{- $secret := lookup "v1" "Secret" .Release.Namespace "overleaf-secrets" }}
{{- $staging := default (randAlphaNum 32) ($secret.data.STAGING_PASSWORD | b64dec) }}
stringData:
  OVERLEAF_INVITE_TOKEN_SECRET: {{ default (randAlphaNum 32) ($secret.data.OVERLEAF_INVITE_TOKEN_SECRET | b64dec) | quote }}
  WEB_API_PASSWORD: {{ default (randAlphaNum 32) ($secret.data.WEB_API_PASSWORD | b64dec) | quote }}
  STAGING_PASSWORD: {{ $staging | quote }}
  V1_HISTORY_PASSWORD: {{ $staging | quote }}
  CRYPTO_RANDOM: {{ default (randAlphaNum 32) ($secret.data.CRYPTO_RANDOM | b64dec) | quote }}
  OT_JWT_AUTH_KEY: {{ default (randAlphaNum 32) ($secret.data.OT_JWT_AUTH_KEY | b64dec) | quote }}
  GITHUB_TOKEN_CIPHER_PASSWORD: {{ default (randAlphaNum 32) ($secret.data.GITHUB_TOKEN_CIPHER_PASSWORD | b64dec) | quote }}
