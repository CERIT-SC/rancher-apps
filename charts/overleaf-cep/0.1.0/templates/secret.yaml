apiVersion: v1
kind: Secret
metadata:
  name: overleaf-secrets
  labels:
    app.kubernetes.io/name: overleaf
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
{{- /*
  STAGING_PASSWORD and V1_HISTORY_PASSWORD must be the SAME value:
  project-history sends V1_HISTORY_PASSWORD to history-v1, which authenticates
  against STAGING_PASSWORD. Generate once, use for both keys.
  Note: randAlphaNum is re-evaluated on each helm upgrade, so we rely on the
  Secret being immutable once created (helm upgrade preserves existing Secret
  values when stringData keys already exist in the cluster).
*/}}
{{- $staging := randAlphaNum 32 }}
stringData:
  OVERLEAF_INVITE_TOKEN_SECRET: {{ required "overleaf.inviteTokenSecret must be set (or let the chart generate one)" .Values.overleaf.inviteTokenSecret | quote }}
  WEB_API_PASSWORD: {{ randAlphaNum 32 | quote }}
  STAGING_PASSWORD: {{ $staging | quote }}
  V1_HISTORY_PASSWORD: {{ $staging | quote }}
  CRYPTO_RANDOM: {{ randAlphaNum 32 | quote }}
  OT_JWT_AUTH_KEY: {{ randAlphaNum 32 | quote }}
  GITHUB_TOKEN_CIPHER_PASSWORD: {{ randAlphaNum 32 | quote }}
