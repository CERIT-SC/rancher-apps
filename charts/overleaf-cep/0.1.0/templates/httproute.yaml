apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: overleaf
  labels:
    app.kubernetes.io/name: overleaf
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: kube-system
      sectionName: websecure
  hostnames:
    - {{ include "overleaf.host" . | quote }}
  rules:
    - backendRefs:
        - name: overleaf
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: overleaf-redirect
  labels:
    app.kubernetes.io/name: overleaf
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: kube-system
      sectionName: web
  hostnames:
    - {{ include "overleaf.host" . | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
