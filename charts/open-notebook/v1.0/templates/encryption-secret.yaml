apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-notebook.fullname" . }}-encryption-key
  labels:
    {{- include "open-notebook.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- $secret := lookup "v1" "Secret" .Release.Namespace (printf "%s-encryption-key" (include "open-notebook.fullname" .)) }}
  {{- if $secret }}
  OPEN_NOTEBOOK_ENCRYPTION_KEY: {{ index $secret.data "OPEN_NOTEBOOK_ENCRYPTION_KEY" }}
  {{- else }}
  OPEN_NOTEBOOK_ENCRYPTION_KEY: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
