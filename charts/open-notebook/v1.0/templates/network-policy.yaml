apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "open-notebook.fullname" . }}-surrealdb
  labels:
    {{- include "open-notebook.labels" . | nindent 4 }}
    app.kubernetes.io/component: surrealdb
spec:
  podSelector:
    matchLabels:
      {{- include "open-notebook.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: surrealdb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "open-notebook.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: open-notebook
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "open-notebook.fullname" . }}-open-notebook
  labels:
    {{- include "open-notebook.labels" . | nindent 4 }}
    app.kubernetes.io/component: open-notebook
spec:
  podSelector:
    matchLabels:
      {{- include "open-notebook.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: open-notebook
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8502
        - protocol: TCP
          port: 5055
