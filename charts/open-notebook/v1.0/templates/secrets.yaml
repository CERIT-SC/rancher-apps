apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-notebook.fullname" . }}-env
  labels:
    {{- include "open-notebook.labels" . | nindent 4 }}
stringData:
  API_URL: {{ .Values.app.url | default (printf "https://open-notebook.%s.dyn.cloud.e-infra.cz" .Release.Namespace) | quote }}
  OPEN_NOTEBOOK_PASSWORD: {{ .Values.app.password | quote }}
  OPENAI_COMPATIBLE_BASE_URL: {{ .Values.llm.baseUrl | quote }}
  OPENAI_COMPATIBLE_API_KEY: {{ .Values.llm.apiKey | quote }}
  SURREAL_URL: "ws://{{ include "open-notebook.fullname" . }}-surrealdb/rpc:8000"
  SURREAL_USER: {{ .Values.surrealdb.user | quote }}
  SURREAL_PASSWORD: {{ .Values.surrealdb.password | quote }}
  SURREAL_NAMESPACE: {{ .Values.surrealdb.namespace | quote }}
  SURREAL_DATABASE: {{ .Values.surrealdb.database | quote }}
  SURREAL_COMMANDS_RETRY_ENABLED: "true"
  SURREAL_COMMANDS_RETRY_MAX_ATTEMPTS: "3"
  SURREAL_COMMANDS_RETRY_WAIT_STRATEGY: "exponential_jitter"
  SURREAL_COMMANDS_RETRY_WAIT_MIN: "1"
  SURREAL_COMMANDS_RETRY_WAIT_MAX: "30"
  SURREAL_COMMANDS_MAX_TASKS: "5"
  SURREAL_EXPERIMENTAL_GRAPHQL: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-notebook.fullname" . }}-surrealdb-credentials
  labels:
    {{- include "open-notebook.labels" . | nindent 4 }}
type: Opaque
data:
  username: {{ .Values.surrealdb.user | b64enc | quote }}
  password: {{ .Values.surrealdb.password | b64enc | quote }}
