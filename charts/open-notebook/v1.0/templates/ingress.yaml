{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "open-notebook.fullname" . }}
  labels:
    {{- include "open-notebook.labels" . | nindent 4 }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- $host := .Values.ingress.host | default (printf "open-notebook.%s.dyn.cloud.e-infra.cz" .Release.Namespace) }}
  tls:
    - hosts:
        - {{ $host }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" (include "open-notebook.fullname" .)) }}
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "open-notebook.fullname" . }}
                port:
                  number: {{ .Values.service.openNotebook.uiPort }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "open-notebook.fullname" . }}
                port:
                  number: {{ .Values.service.openNotebook.apiPort }}
{{- end }}
