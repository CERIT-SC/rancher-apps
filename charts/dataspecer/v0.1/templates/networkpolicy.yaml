apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dataspecer.fullname" . }}
  labels:
    {{- include "dataspecer.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "dataspecer.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8089
