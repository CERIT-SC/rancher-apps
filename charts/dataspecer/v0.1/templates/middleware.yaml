apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "dataspecer.fullname" . }}-redirect-https
  labels:
    {{- include "dataspecer.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "dataspecer.fullname" . }}-basic-auth
  labels:
    {{- include "dataspecer.labels" . | nindent 4 }}
spec:
  basicAuth:
    secret: {{ include "dataspecer.fullname" . }}-auth
