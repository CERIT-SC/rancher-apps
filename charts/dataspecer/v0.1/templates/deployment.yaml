apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dataspecer.fullname" . }}
  labels:
    {{- include "dataspecer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dataspecer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dataspecer.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dataspecer
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "dataspecer.fullname" . }}-config
          volumeMounts:
            - name: database
              mountPath: /usr/src/app/database
            - name: html
              mountPath: /usr/src/app/html
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: database
          persistentVolumeClaim:
            claimName: {{ include "dataspecer.fullname" . }}-database
        - name: html
          emptyDir: {}
